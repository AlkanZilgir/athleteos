name: Lighthouse

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install LHCI + http-server
        run: npm install --no-save @lhci/cli@0.14.x http-server@14

      - name: Run Lighthouse CI
        # LHCI starts http-server via startServerCommand in lighthouserc.json,
        # waits for the "Available on" log line, runs the audit, then shuts it
        # down — no manual backgrounding needed.
        run: npx lhci autorun --config=./lighthouserc.json

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
